services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: etms
      POSTGRES_USER: etms
      POSTGRES_PASSWORD: etms_password
    ports:
      - "5432:5432"
    volumes:
      - etms_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etms -d etms"]
      interval: 8s
      timeout: 5s
      retries: 5

volumes:
  etms_postgres:
